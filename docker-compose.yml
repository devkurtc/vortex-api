services:
  vortex-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vortex-api
    restart: unless-stopped
    ports:
      - "3090:3000"
    volumes:
      - vortex-api-data:/app/data
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

volumes:
  vortex-api-data:
    driver: local
