name: Deploy to Portainer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Portainer
        id: auth
        run: |
          TOKEN=$(curl -sk -X POST "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"${{ secrets.PORTAINER_USER }}\",\"Password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r .jwt)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get current stack compose
        id: stack
        run: |
          COMPOSE=$(curl -sk "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/file" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            | jq -r .StackFileContent)
          echo "compose<<EOF" >> $GITHUB_OUTPUT
          echo "$COMPOSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Inject DEPLOY_SHA to force container recreation
        id: compose
        run: |
          COMPOSE="${{ steps.stack.outputs.compose }}"
          SHA="${{ github.sha }}"

          if echo "$COMPOSE" | grep -q 'DEPLOY_SHA='; then
            # Replace existing DEPLOY_SHA value with new commit SHA
            COMPOSE=$(echo "$COMPOSE" | sed "s/DEPLOY_SHA=.*/DEPLOY_SHA=${SHA}/")
          else
            # Add DEPLOY_SHA after the environment: line
            COMPOSE=$(echo "$COMPOSE" | sed "/environment:/a\\      - DEPLOY_SHA=${SHA}")
          fi

          echo "compose<<EOF" >> $GITHUB_OUTPUT
          echo "$COMPOSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Redeploy stack
        run: |
          jq -n \
            --arg c "${{ steps.compose.outputs.compose }}" \
            '{stackFileContent: $c, env: [], prune: true, pullImage: true}' > /tmp/payload.json

          curl -sk -X PUT "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json

      - name: Verify deployment
        run: |
          echo "Waiting for container to recreate and app to come online..."
          APP_URL="https://vltc-app.syzygyonline.com"
          MAX_ATTEMPTS=24
          SLEEP_SECONDS=10

          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' "$APP_URL" || echo "000")
            echo "Attempt $i/$MAX_ATTEMPTS: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "App is live at $APP_URL"
              exit 0
            fi

            sleep $SLEEP_SECONDS
          done

          echo "App did not respond with HTTP 200 within $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
          exit 1
